seed: 1
record_video: yes

environment:
  render: True
  num_envs: 200
  eval_every_n: 200
  num_threads: 30
  simulation_dt: 0.0025
  control_dt: 0.01
  max_time: 10.0
  
  #command velocity
  maxlinvellimit: 2.0
  maxangvel: 1.0
  commandresamplestep: 200

  #joint movement limit
  roll_action_std: 0.05
  hip_action_std: 0.2
  knee_action_std: 0.2

  #verticalheightpenalty
  maxverticalheight: 0.60

  reward:
    linearvelerr:
      coeff: 4.0
    angularvelerr:
      coeff: 4.0
    verticalheight:
      coeff: -2.0 
    torque:
      coeff: -3e-4
    airtime:
      coeff: 0.5 #redundant
    rollpitch:
      coeff: -0.5
    diagonalgait:
      coeff: 0.5
    actionsmoothness1:
      coeff: -2.5
    actionsmoothness2:
      coeff: -1.2
    jointvelocity:
      coeff: -6e-4

architecture:
  policy_net: [128, 128]
  value_net: [128, 128]
