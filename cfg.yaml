seed: 1
record_video: yes

environment:
  render: True
  num_envs: 200
  eval_every_n: 200
  num_threads: 30
  simulation_dt: 0.0025
  control_dt: 0.01
  max_time: 10.0
  
  #command velocity
  maxlinvel: 3.0
  maxangvel: 1.5
  commandresamplestep: 200

  #joint movement limit
  roll_action_std: 0.1
  hip_action_std: 0.2
  knee_action_std: 0.1

  reward:
    linearvelerr:
      coeff: 5.0
    angularvelerr:
      coeff: 3.0
    torque:
      coeff: -6e-4
    footclearance:
      coeff: -3.0
    heightdeviation:
      coeff: -3.0

architecture:
  policy_net: [128, 128]
  value_net: [128, 128]
